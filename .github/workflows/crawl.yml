name: 数据采集 + 部署
# 由 cron-job.org 通过 repository_dispatch 触发，不用 GitHub 自带 schedule

on:
  repository_dispatch:
    types: [crawl]
  workflow_dispatch:  # 也允许手动触发
  push:
    branches: [main]

# 确保并发运行不会被互相覆盖
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jiarenmens/requirements.txt

      - name: 安装依赖
        run: pip install requests aiohttp

      - name: 数据采集
        run: cd jiarenmens && python main.py --checkpoint-reset

      - name: 导出 JSON
        run: cd jiarenmens && python scripts/export_json.py --out ../stockboard-app/public/data

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stockboard-app/package-lock.json

      - name: Build Vue
        run: cd stockboard-app && npm ci && npm run build

      - name: 提交数据
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f stockboard-app/public/data/ jiarenmens/data/
          git diff --staged --quiet || git commit -m "📊 数据更新 $(date +%Y-%m-%d)"
          git push

      - name: 钉钉通知
        if: success()
        env:
          DINGTALK_URL: ${{ secrets.DINGTALK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          python3 << 'PYEOF'
          import json, time, hmac, hashlib, base64, urllib.request, os

          with open("stockboard-app/public/data/latest/summary.json") as f:
              s = json.load(f)

          date_str = s["date"]
          crawl_time = s.get("crawl_time", "")
          traded_set = set(s.get("tradedPlayerIds", []))

          BASE_URL = "https://WXinYi.github.io/stockboard"

          # 关注选手调仓详情（读选手详情文件）
          watched = {"900240956": "股得猫咛", "900354116": "不服输不认命MG"}
          watched_lines = []
          for wid, wname in watched.items():
              detail_path = f"stockboard-app/public/data/latest/players/{wid}.json"
              link = f"[{wname}]({BASE_URL}/#/player/{wid})"
              if os.path.exists(detail_path):
                  with open(detail_path) as f:
                      d = json.load(f)
                  buys = [t["stock_name"] for t in d.get("trades", []) if t.get("direction") == "买入"]
                  sells = [t["stock_name"] for t in d.get("trades", []) if t.get("direction") == "卖出"]
                  parts = []
                  if buys:
                      parts.append(f"买入 {', '.join(buys)}")
                  if sells:
                      parts.append(f"卖出 {', '.join(sells)}")
                  if parts:
                      watched_lines.append(f"{link}: {' | '.join(parts)}")
                  else:
                      watched_lines.append(f"{link}: 今日无调仓")
              else:
                  watched_lines.append(f"{link}: —")

          # 周榜前5中有调仓的，名字加链接
          weekly_top = sorted(s["players"], key=lambda p: p.get("weekly_return") or 0, reverse=True)[:5]
          top_traded = [p for p in weekly_top if p["id"] in traded_set]
          if top_traded:
              top_links = ["、".join(f"[{p['name']}]({BASE_URL}/#/player/{p['id']})" for p in top_traded)]
              top5_text = "".join(top_links) + " 有调仓"
          else:
              top5_text = "今日均无调仓"

          text = (
              f"## 📊 东财实盘排行榜已更新\n\n"
              f"> 采集时间: {crawl_time}\n\n"
              f"---\n\n"
              f"### ⭐ 特别关注\n\n"
              + "\n\n".join(watched_lines) +
              f"\n\n---\n\n"
              f"### 🏆 周榜前5\n\n"
              f"{top5_text}\n\n"
              f"---\n\n"
              f"📈 [打开看板](https://WXinYi.github.io/stockboard/)"
          )

          # 加签
          timestamp = str(round(time.time() * 1000))
          secret = os.environ["DINGTALK_SECRET"]
          sign_str = f"{timestamp}\n{secret}"
          hmac_code = hmac.new(secret.encode(), sign_str.encode(), hashlib.sha256).digest()
          sign = base64.b64encode(hmac_code).decode()

          url = f"{os.environ['DINGTALK_URL']}&timestamp={timestamp}&sign={sign}"
          payload = json.dumps({"msgtype": "markdown", "markdown": {"title": f"StockBoard {date_str}", "text": text}}).encode()

          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})
          resp = urllib.request.urlopen(req, timeout=10)
          print(f"钉钉通知: {resp.read().decode()}")
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: stockboard-app/dist

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
